name: Publish Release

on:
  push:
    tags:
      - 'v*'

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Tag is on main branch
        run: |
          # Fetch remote branches to verify contains
          git fetch origin main:main
          git merge-base --is-ancestor HEAD main || {
            echo "Error: Tag is not on the main branch. Releases must be built from the main branch."
            exit 1
          }

      - name: Create GitHub Release Draft
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            Welcome to the official release of Orbit ${{ github.ref_name }}!
            
            ### Installation Instructions
            - **macOS**: Download the `.dmg` or `.zip` file, mount it, and drag Orbit to your Applications folder.
            - **Windows**: Download the `.exe` installer and run it to set up Orbit.
            
            Refer to the README.md in the repository for detailed setup and features.
          draft: true
          prerelease: false

  build-and-upload:
    name: Build & Upload Assets
    needs: draft-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            extension: dmg
          - os: windows-latest
            platform: win
            extension: exe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile and Package App
        env:
          # On macOS, if code signing is not configured, we disable signing so it compiles locally in CI
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac --config.mac.identity=null
          else
            npx electron-builder --win
          fi
        shell: bash

      - name: Find Packaged Artifacts
        id: find_artifact
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            echo "filepath=$(find release -maxdepth 1 -name '*.dmg' -print -quit)" >> $GITHUB_OUTPUT
            echo "filename=$(basename $(find release -maxdepth 1 -name '*.dmg' -print -quit))" >> $GITHUB_OUTPUT
          else
            echo "filepath=$(find release -maxdepth 1 -name '*.exe' -print -quit)" >> $GITHUB_OUTPUT
            echo "filename=$(basename $(find release -maxdepth 1 -name '*.exe' -print -quit))" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.draft-release.outputs.upload_url }}
          asset_path: ${{ steps.find_artifact.outputs.filepath }}
          asset_name: ${{ steps.find_artifact.outputs.filename }}
          asset_content_type: application/octet-stream
